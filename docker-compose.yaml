name: homelab

services:
  traefik:
    image: "traefik:v3.2"
    container_name: traefik
    # https://blog.marcosalonso.dev/traefik-https-cloudflare/
    command:
      #- "--log.level=DEBUG"
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # HTTPS always
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.websecure.http.tls.certResolver=letsencrypt"
      # Set up LetsEncrypt
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.websecure.http.tls.domains[0].main=${DOMAIN}"
      - "--entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAIN}"
      # docker provider
      - "--providers.docker"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
    environment:
      - CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL?missing CLOUDFLARE_EMAIL}
      - CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN?missing CLOUDFLARE_DNS_API_TOKEN}
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik/letsencrypt:/letsencrypt
    restart: unless-stopped
    networks:
      - proxy

  docker-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    environment:
      - CONTAINERS=1 # Allow access to viewing containers
      - SERVICES=1 # Allow access to viewing services (necessary when using Docker Swarm)
      - TASKS=1 # Allow access to viewing tasks (necessary when using Docker Swarm)
      - POST=0 # Disallow any POST operations (effectively read-only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - docker-proxy

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    volumes:
      - ./config/homepage:/app/config
      - ./library:/mnt/library
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - HOMEPAGE_ALLOWED_HOSTS=${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.homepage.service=homepage"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
    restart: unless-stopped
    networks:
      - proxy
      - docker-proxy

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PORT=5055
    volumes:
      - ./data/jellyseerr/config:/app/config
    labels:
      - "homepage.group=Media"
      - "homepage.name=Jellyseerr"
      - "homepage.icon=jellyseerr.png"
      - "homepage.href=https://jellyseerr.${DOMAIN}"
      - "homepage.description=Request shows & movies"
      - "homepage.weight=10"
      - "homepage.widget.type=jellyseerr"
      - "homepage.widget.url=https://jellyseerr.${DOMAIN}"
      - "homepage.widget.key=${API_KEY_JELLYSEERR}"

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: ${PUID}:${PGID}
    group_add:
      - "989" # render group id on host
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/jellyfin/cache:/cache
      - type: bind
        source: ./library
        target: /library
    devices:
      - /dev/dri:/dev/dri
    environment:
      - JELLYFIN_PublishedServerUrl=https://jellyfin.${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.service=jellyfin"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      # homepage
      - "homepage.group=Media"
      - "homepage.name=Jellyfin"
      - "homepage.icon=jellyfin.png"
      - "homepage.href=https://jellyfin.${DOMAIN}"
      - "homepage.description=Watch shows & movies"
      - "homepage.weight=5"
      - "homepage.widget.type=jellyfin"
      - "homepage.widget.url=https://jellyfin.${DOMAIN}"
      - "homepage.widget.key=${API_KEY_JELLYFIN}"

  # Gluetun VPN container (with Mullvad)
  gluetun:
    image: "qmcgaw/gluetun:latest"
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    networks:
      - proxy
    volumes:
      - ./data/gluetun:/gluetun
    environment:
      - BLOCK_ADS=on
      - BLOCK_MALICIOUS=on
      - BLOCK_SURVEILLANCE=on
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY?missing WIREGUARD_PRIVATE_KEY}
      - SERVER_CITIES=${VPN_CITY?missing VPN_CITY}
      - PORT_FORWARD_ONLY=on
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":{{PORT}},\"current_network_interface\":\"{{VPN_INTERFACE}}\",\"random_port\":false,\"upnp\":false}" http://127.0.0.1:8080/api/v2/app/setPreferences'
      - VPN_PORT_FORWARDING_DOWN_COMMAND=/bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":0,\"current_network_interface\":\"lo\"}" http://127.0.0.1:8080/api/v2/app/setPreferences'
      - UPDATER_PERIOD=24h
      - TZ=${TZ}
    labels:
      # Treafik
      - "traefik.enable=true"
      # Gluetun Built-in HTTP control server (API Endpoint)
      - "traefik.http.routers.gluetun.entrypoints=websecure"
      - "traefik.http.routers.gluetun.rule=Host(`gluetun.${DOMAIN}`)"
      - "traefik.http.routers.gluetun.service=gluetun"
      - "traefik.http.services.gluetun.loadbalancer.server.port=8000"
      # Prowlarr
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.service=prowlarr"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      # Radarr
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.service=radarr"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      # Sonarr
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.service=sonarr"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      # Cleanuparr
      - "traefik.http.routers.cleanuparr.entrypoints=websecure"
      - "traefik.http.routers.cleanuparr.rule=Host(`cleanuparr.${DOMAIN}`)"
      - "traefik.http.routers.cleanuparr.service=cleanuparr"
      - "traefik.http.services.cleanuparr.loadbalancer.server.port=11011"
      # Jellyseerr
      - "traefik.http.routers.jellyseerr.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${DOMAIN}`)"
      - "traefik.http.routers.jellyseerr.service=jellyseerr"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
      # qBittorrent
      - "traefik.http.routers.qbt.entrypoints=websecure"
      - "traefik.http.routers.qbt.rule=Host(`qbt.${DOMAIN}`)"
      - "traefik.http.routers.qbt.service=qbt"
      - "traefik.http.services.qbt.loadbalancer.server.port=8080"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PGID=${PGID}
      - PUID=${PUID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:qbittorrent
      - TP_COMMUNITY_THEME=true
      - TP_THEME=catppuccin-frappe
    volumes:
      - ./data/qbittorrent:/config
      - ./library:/library
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -s http://127.0.0.1:8080/api/v2/transfer/info | jq -e ''.connection_status == "connected"''',
        ]
      interval: 60s
      timeout: 3s
      retries: 5
      start_period: 5m
    labels:
      - "homepage.group=Media"
      - "homepage.name=Qbittorrent"
      - "homepage.icon=qbittorrent.png"
      - "homepage.href=https://qbt.${DOMAIN}"
      - "homepage.description=Torrent downloader"
      - "homepage.weight=15"
      - "homepage.widget.type=qbittorrent"
      - "homepage.widget.url=https://qbt.${DOMAIN}"
      - "homepage.widget.username=${QBT_USERNAME}"
      - "homepage.widget.password=${QBT_PASSWORD}"

  flaresolverr:
    # DockerHub mirror flaresolverr/flaresolverr:latest
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    restart: unless-stopped
    environment:
      - PGID=${PGID}
      - PUID=${PUID}
      - TZ=${TZ}
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:prowlarr
      - TP_COMMUNITY_THEME=true
      - TP_THEME=catppuccin-frappe
    volumes:
      - ./data/prowlarr/config:/config
    labels:
      - "homepage.group=Media"
      - "homepage.name=Prowlarr"
      - "homepage.icon=prowlarr.png"
      - "homepage.href=https://prowlarr.${DOMAIN}"
      - "homepage.description=Indexers management"
      - "homepage.weight=20"
      - "homepage.widget.type=prowlarr"
      - "homepage.widget.url=https://prowlarr.${DOMAIN}"
      - "homepage.widget.key=${API_KEY_PROWLARR}"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    restart: unless-stopped
    environment:
      - PGID=${PGID}
      - PUID=${PUID}
      - TZ=${TZ}
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:radarr
      - TP_COMMUNITY_THEME=true
      - TP_THEME=catppuccin-frappe
    volumes:
      - ./data/radarr/config:/config
      - ./library:/library
      - ./library/downloads:/downloads
    labels:
      - "homepage.group=Media"
      - "homepage.name=Radarr"
      - "homepage.icon=radarr.png"
      - "homepage.href=https://radarr.${DOMAIN}"
      - "homepage.description=Movie downloader"
      - "homepage.weight=20"
      - "homepage.widget.type=radarr"
      - "homepage.widget.url=https://radarr.${DOMAIN}"
      - "homepage.widget.key=${API_KEY_RADARR}"

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    restart: unless-stopped
    environment:
      - PGID=${PGID}
      - PUID=${PUID}
      - TZ=${TZ}
      - DOCKER_MODS=ghcr.io/themepark-dev/theme.park:sonarr
      - TP_COMMUNITY_THEME=true
      - TP_THEME=catppuccin-frappe
    volumes:
      - ./data/sonarr/config:/config
      - ./library:/library
      - ./library/downloads:/downloads
    labels:
      - "homepage.group=Media"
      - "homepage.name=Sonarr"
      - "homepage.icon=sonarr.png"
      - "homepage.href=https://sonarr.${DOMAIN}"
      - "homepage.description=TV downloader"
      - "homepage.weight=20"
      - "homepage.widget.type=sonarr"
      - "homepage.widget.url=https://sonarr.${DOMAIN}"
      - "homepage.widget.key=${API_KEY_SONARR}"

  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    restart: unless-stopped
    volumes:
      - ./data/cleanuparr:/config
    environment:
      - PGID=${PGID}
      - PUID=${PUID}
      - TZ=${TZ}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11011/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    labels:
      - "homepage.group=Media"
      - "homepage.name=Cleanuparr"
      - "homepage.icon=cleanuparr.png"
      - "homepage.href=https://cleanuparr.${DOMAIN}"
      - "homepage.description=Library cleaner"
      - "homepage.weight=20"

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr
    container_name: recyclarr
    network_mode: "service:gluetun"
    volumes:
      - ./data/recyclarr:/config
    environment:
      - TZ=America/New_York

  glance:
    image: glanceapp/glance
    restart: unless-stopped
    volumes:
      - ./config/glance:/app/config
    networks:
      - proxy
    env_file:
      - .env
    labels:
      # traefik
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.glance.entrypoints=websecure"
      - "traefik.http.routers.glance.rule=Host(`glance.${DOMAIN}`)"
      - "traefik.http.routers.glance.service=glance"
      - "traefik.http.services.glance.loadbalancer.server.port=8080"
      # homepage
      - "homepage.group=Content"
      - "homepage.name=Glance"
      - "homepage.icon=glance.png"
      - "homepage.href=https://glance.${DOMAIN}"
      - "homepage.description=Everything at a glance"

  karakeep:
    image: ghcr.io/karakeep-app/karakeep:release
    restart: unless-stopped
    volumes:
      - ./data/karakeep:/data
    networks:
      - proxy
      - karakeep
    environment:
      - DATA_DIR=/data
      - MEILI_ADDR=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - BROWSER_WEB_URL=http://chrome:9222
      - NEXTAUTH_URL=https://keep.${DOMAIN}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    labels:
      # traefik
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.karakeep.entrypoints=websecure"
      - "traefik.http.routers.karakeep.rule=Host(`keep.${DOMAIN}`)"
      - "traefik.http.routers.karakeep.service=karakeep"
      - "traefik.http.services.karakeep.loadbalancer.server.port=3000"
      # homepage
      - "homepage.group=Content"
      - "homepage.name=Karakeep"
      - "homepage.icon=karakeep.png"
      - "homepage.href=https://keep.${DOMAIN}"
      - "homepage.description=Hoard all the data"

  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:123
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    networks:
      - karakeep

  meilisearch:
    image: getmeili/meilisearch:v1.13.3
    restart: unless-stopped
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - meilisearch:/meili_data
    networks:
      - karakeep

  uptime-kuma:
    image: louislam/uptime-kuma:2
    restart: unless-stopped
    volumes:
      - ./data/uptime-kuma:/app/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime.entrypoints=websecure"
      - "traefik.http.routers.uptime.rule=Host(`status.${DOMAIN}`)"
      - "traefik.http.routers.uptime.service=uptime"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"

networks:
  proxy:
    external: true
  docker-proxy:
  karakeep:

volumes:
  meilisearch:
